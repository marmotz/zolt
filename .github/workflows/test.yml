name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type Check
        run: bun run type:check

      - name: Format Check
        run: bun run format:check

      - name: Lint Check
        run: bun run lint:check

      - name: Build Linux
        run: bun run build:bin:linux

      - name: Run Tests
        run: bun run test
